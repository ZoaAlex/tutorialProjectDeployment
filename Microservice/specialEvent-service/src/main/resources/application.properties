spring.application.name=SpecialEvent-service
server.port=8086

spring.datasource.password=root
spring.datasource.username=root
spring.datasource.url= jdbc:mysql://localhost:3306/SpecialEventdb
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ==============================
# EUREKA CLIENT - CONFIGURATION COMPLETE ET FIABLE
# ==============================
# URL du serveur Eureka (change le port ou l'adresse selon ton cas)
eureka.client.service-url.defaultZone=http://localhost:8760/eureka/

# Facultatif mais fortement recommande en developpement
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Affichage plus clair dans l'interface Eureka (fortement recommande)
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.int}
eureka.instance.prefer-ip-address=true

# Heartbeat et expiration (valeurs un peu plus rapides en dev, tu peux laisser les defauts en prod)
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Optionnel : metadonnees utiles (version, profil, etc.)
eureka.instance.metadata-map.spring-boot-version=${spring-boot.version}
eureka.instance.metadata-map.profile=${spring.profiles.active:default}
