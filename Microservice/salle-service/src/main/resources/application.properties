# Configuration du serveur
server.port=8084
spring.application.name=salles-service

# Configuration de la base de donn\u00e9es MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sallesdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuration Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8760/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost


# Configuration des logs
logging.level.iusjc_planning.salles_service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Configuration de validation
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# Configuration des services externes
services.planning-service.url=http://localhost:8083
services.user-service.url=http://localhost:8081

# Configuration Feign
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=10000
feign.client.config.planning-service.connect-timeout=3000
feign.client.config.planning-service.read-timeout=8000

# Configuration du circuit breaker (Hystrix)
feign.hystrix.enabled=true
hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds=10000