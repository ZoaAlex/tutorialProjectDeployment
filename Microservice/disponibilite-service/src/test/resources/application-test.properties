# Configuration pour les tests
spring.application.name=planning-service-test
server.port=0

# Base de donnÃ©es H2 en mÃ©moire pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration pour tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DÃ©sactiver Feign pour les tests
spring.cloud.openfeign.client.config.default.connectTimeout=1000
spring.cloud.openfeign.client.config.default.readTimeout=1000

# Logging pour tests
logging.level.org.springframework=WARN
logging.level.iusjc_planning.planning_service=DEBUG
logging.level.org.hibernate.SQL=DEBUG