<div class="login-page">
  <div class="login-card card">
    <div class="card-body">
      <div class="login-logo">
        <img src="SAINT JEAN IMAGE2.png" alt="Saint Jean Chrysostome" class="logo-image" />
      </div>

      <div class="text-center mb-4">
        <h2 class="fw-bold mb-2">SMART PLANNING</h2>
        <p class="text-muted">Connectez-vous à votre espace IUSJC</p>
      </div>

      @if (error()) {
      <div class="alert alert-danger d-flex align-items-center animate-fade-in mb-4">
        <i class="fas fa-exclamation-circle me-2"></i>
        {{ error() }}
      </div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="form-label text-muted small fw-medium">EMAIL</label>
          <div class="input-group">
            <span class="input-group-text border-end-0">
              <i class="fas fa-envelope"></i>
            </span>
            <input type="email" class="form-control border-start-0" [(ngModel)]="email" name="email"
              placeholder="votre@email.cm" required />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-muted small fw-medium">MOT DE PASSE</label>
          <div class="input-group">
            <span class="input-group-text border-end-0">
              <i class="fas fa-lock"></i>
            </span>
            <input [type]="showPassword ? 'text' : 'password'" class="form-control border-0" [(ngModel)]="password"
              name="password" placeholder="••••••••" required />
            <button type="button" class="input-group-text border-start-0" (click)="showPassword = !showPassword"
              style="cursor: pointer">
              <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" [(ngModel)]="rememberMe" name="rememberMe"
              id="rememberMe" />
            <label class="form-check-label text-muted small" for="rememberMe">Se souvenir de moi</label>
          </div>
          <a routerLink="/forgot-password" class="small" style="color: var(--accent-purple)">Mot de passe oublié?</a>
        </div>

        <button type="submit" class="btn btn-glow w-100 mb-4" [disabled]="loading()">
          @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2"></span>
          Connexion en cours...
          } @else {
          <i class="fas fa-rocket me-2"></i>Se connecter
          }
        </button>
      </form>
    </div>
  </div>
</div>
