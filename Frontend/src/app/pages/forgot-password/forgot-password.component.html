<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="auth-card p-4 p-md-5 animate-fade-in-up" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <div class="logo-container mb-3">
                <i class="fas fa-key fa-3x" style="color: var(--accent-purple)"></i>
            </div>
            <h2 class="auth-title h3 mb-2">Récupération</h2>
            <p class="text-muted">Suivez les étapes pour réinitialiser votre compte</p>
        </div>

        @if (error()) {
        <div class="alert alert-danger mb-4 py-2 small animate-shake">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error() }}
        </div>
        }

        @if (message()) {
        <div class="alert alert-success mb-4 py-2 small animate-fade-in">
            <i class="fas fa-check-circle me-2"></i>{{ message() }}
        </div>
        }

        <!-- STEP 1: Email -->
        @if (step() === 1) {
        <form (ngSubmit)="sendCode()">
            <div class="mb-4">
                <label class="form-label text-muted small fw-medium text-uppercase ls-1">Email académique</label>
                <div class="input-group input-group-glass">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" name="email" [(ngModel)]="email"
                        placeholder="votre.nom@iusjc.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3" [disabled]="loading()">
                @if (loading()) {
                <span class="spinner-border spinner-border-sm me-2"></span>Envoi en cours...
                } @else {
                Envoyer le code
                }
            </button>
        </form>
        }

        <!-- STEP 2: Code -->
        @if (step() === 2) {
        <form (ngSubmit)="verifyCode()">
            <div class="mb-4">
                <label class="form-label text-muted small fw-medium text-uppercase ls-1">Code de vérification</label>
                <div class="input-group input-group-glass">
                    <span class="input-group-text"><i class="fas fa-shield-alt"></i></span>
                    <input type="text" class="form-control" name="code" [(ngModel)]="code" placeholder="000000"
                        maxlength="6" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3" [disabled]="loading()">
                Vérifier le code
            </button>
            <button type="button" class="btn btn-link w-100 text-muted small" (click)="step.set(1)">Réessayer avec un
                autre email</button>
        </form>
        }

        <!-- STEP 3: Reset -->
        @if (step() === 3) {
        <form (ngSubmit)="resetPassword()">
            <div class="mb-3">
                <label class="form-label text-muted small fw-medium text-uppercase ls-1">Nouveau mot de passe</label>
                <div class="input-group input-group-glass">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="newPassword" [(ngModel)]="newPassword"
                        placeholder="••••••••" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-medium text-uppercase ls-1">Confirmer le mot de
                    passe</label>
                <div class="input-group input-group-glass">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="confirmPassword" [(ngModel)]="confirmPassword"
                        placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3" [disabled]="loading()">
                @if (loading()) {
                <span class="spinner-border spinner-border-sm me-2"></span>Mises à jour...
                } @else {
                Réinitialiser
                }
            </button>
        </form>
        }

        <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
            <a routerLink="/login" class="text-decoration-none small fw-bold" style="color: var(--accent-blue)">
                <i class="fas fa-arrow-left me-2"></i>Retour à la connexion
            </a>
        </div>
    </div>
</div>
