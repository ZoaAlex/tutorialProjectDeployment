spring.datasource.url=jdbc:mysql://mysql:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.jpa.hibernate.ddl-auto=update

# ==============================
# LOGGING DOCKER - DEBUG INTER-SERVICES
# ==============================
logging.level.root=INFO
logging.level.com.iusjc.userservice=DEBUG
# Feign - appels sortants
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.feign=DEBUG
# HTTP entrant
logging.level.org.springframework.web=DEBUG
# Eureka
logging.level.org.springframework.cloud.netflix.eureka=DEBUG
logging.level.com.netflix.discovery=DEBUG
# SQL
logging.level.org.hibernate.SQL=DEBUG
# Format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n
