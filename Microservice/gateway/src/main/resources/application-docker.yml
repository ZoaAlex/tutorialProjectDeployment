spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8082
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**,/api/enseignants/**

        - id: disponibilite-service
          uri: http://disponibilite-service:8083
          predicates:
            - Path=/api/disponibilites,/api/disponibilites/**

        - id: salles-service
          uri: http://salles-service:8084
          predicates:
            - Path=/api/salles/**,/api/materiels/**,/api/reservations/**

        - id: coursclasse-service
          uri: http://coursclasse-service:8085
          predicates:
            - Path=/api/classes/**,/api/cours/**,/api/ecoles/**,/api/etudiants/**,/api/filieres/**,/api/groupes-etudiants/**,/api/ues/**,/api/import/**

        - id: specialevent-service
          uri: http://specialevent-service:8086
          predicates:
            - Path=/api/demandes/**,/api/events/**

        - id: planning-service
          uri: http://planning-service:8087
          predicates:
            - Path=/api/generation/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:8100"
              - "http://frontend:4200"
              - "http://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

