# APPLICATION CONFIG
spring.application.name=disponibilite-service
server.port=8083

# EUREKA CLIENT
# URL du serveur Eureka (change le port ou l'adresse selon ton cas)
eureka.client.service-url.defaultZone=http://localhost:8760/eureka/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# FEIGN CONFIG
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# USER SERVICE URL
user-service.url=http://localhost:8081

# RABBITMQ CONFIGURATION
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=60000
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.multiplier=2.0

# LOGGING
logging.level.org.springframework=INFO
logging.level.iusjc_planning.planning_service=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.org.springframework.amqp=DEBUG

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dispodb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-format=HH:mm:ss