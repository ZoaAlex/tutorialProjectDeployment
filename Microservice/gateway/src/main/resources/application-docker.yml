spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:8100"
              - "http://frontend:4200"
              - "http://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# ==============================
# LOGGING - DEBUG INTER-SERVICES
# ==============================
logging:
  level:
    root: INFO
    # Gateway routing & forwarding
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: INFO
    # HTTP client (requêtes sortantes vers les microservices)
    reactor.netty.http.client: DEBUG
    # WebFlux (requêtes entrantes)
    org.springframework.web.reactive: DEBUG
    # Eureka (enregistrement et découverte)
    org.springframework.cloud.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
