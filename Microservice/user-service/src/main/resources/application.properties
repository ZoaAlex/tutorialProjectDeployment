# Nom de l'application (doit etre unique dans Eureka)
spring.application.name=user-service

# Port du microservice
server.port=8081

# ==============================
# EUREKA CLIENT - CONFIGURATION COMPLETE ET FIABLE
# ==============================
# URL du serveur Eureka (change le port ou l'adresse selon ton cas)
eureka.client.service-url.defaultZone=http://localhost:8760/eureka/

# Facultatif mais fortement recommande en developpement
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Affichage plus clair dans l'interface Eureka (fortement recommande)
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.int}
eureka.instance.prefer-ip-address=true

# Heartbeat et expiration (valeurs un peu plus rapides en dev, tu peux laisser les defauts en prod)
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# Optionnel : metadonnees utiles (version, profil, etc.)
eureka.instance.metadata-map.spring-boot-version=${spring-boot.version}
eureka.instance.metadata-map.profile=${spring.profiles.active:default}

# ==============================
# FEIGN (si tu appelles d'autres services)
# ==============================
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000

# ==============================
# BASE DE DONNEES MySQL
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# LOGGING
# ==============================
logging.level.root=INFO
logging.level.com.iusjc.userservice=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO