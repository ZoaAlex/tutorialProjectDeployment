<app-sidebar></app-sidebar>

<div class="main-content">
  <app-navbar pageTitle="Réservations"></app-navbar>

  <div class="card mb-4">
    <div class="card-body">
      <div class="row align-items-end">
        <div class="col-md-4">
          <select class="form-select" [ngModel]="filterStatut()" (ngModelChange)="filterStatut.set($event)">
            <option value="">Tous les statuts</option>
            <option value="VALIDEE">Validées</option>
            <option value="EN_ATTENTE">En attente</option>
            <option value="ANNULEE">Annulées</option>
          </select>
        </div>
        <div class="col-md-8 text-end">
          <button class="btn btn-primary" (click)="openModal()"><i class="fas fa-plus me-2"></i>Nouvelle
            réservation</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Salle</th>
              <th>Date</th>
              <th>Motif</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            @for (r of filteredReservations(); track r.id) {
            <tr>
              <td><strong>{{ getSalleNom(r.salleId) }}</strong></td>
              <td>{{ r.dateDebut | date:'dd/MM/yyyy' }}</td>
              <td>{{ r.motif }}</td>
              <td>
                <span class="badge" [class.bg-success]="r.statut === 'VALIDEE'"
                  [class.bg-warning]="r.statut === 'EN_ATTENTE'"
                  [class.bg-danger]="r.statut === 'ANNULEE' || r.statut === 'REJETEE'">
                  {{ r.statut }}
                </span>
              </td>
              <td>
                @if (r.statut === 'EN_ATTENTE') {
                <button class="btn btn-sm btn-outline-danger" (click)="cancelReservation(r.id!)"><i
                    class="fas fa-times"></i></button>
                }
              </td>
            </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Nouvelle Réservation -->
@if (showModal()) {
<div class="modal fade show d-block" style="background: rgba(0,0,0,0.5);">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nouvelle réservation</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Salle</label>
          <select class="form-select" [(ngModel)]="newReservation().salleId">
            <option value="0">Sélectionner une salle</option>
            @for (s of salles(); track s.id) {
            <option [value]="s.id">{{ s.nom }} ({{ s.capacite }} places)</option>
            }
          </select>
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Date début</label>
            <input type="date" class="form-control" [(ngModel)]="newReservation().dateDebut">
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Date fin</label>
            <input type="date" class="form-control" [(ngModel)]="newReservation().dateFin">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Motif</label>
          <textarea class="form-control" rows="3" [(ngModel)]="newReservation().motif"
            placeholder="Décrivez le motif de la réservation..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Annuler</button>
        <button type="button" class="btn btn-primary" (click)="submitReservation()">Soumettre</button>
      </div>
    </div>
  </div>
</div>
}
